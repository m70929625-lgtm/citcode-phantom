<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Task Manager</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            color: #1e293b;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.25rem;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f8fafc;
            padding: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li button {
            background: #ef4444;
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }

        li button:hover {
            background: #dc2626;
        }

        .back-link {
            display: block;
            margin-top: 1rem;
            text-align: center;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Task Manager</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
        <a href="../../index.html" class="back-link">← Back to Portfolio</a>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text) {
                const li = document.createElement('li');
                li.innerHTML = `<span>${text}</span> <button onclick="this.parentElement.remove()">Delete</button>`;
                document.getElementById('taskList').appendChild(li);
                input.value = '';
            }
        }
    </script>
</body>

</html>
